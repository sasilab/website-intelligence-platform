version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:6.0
    container_name: wip-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: website_intelligence
    volumes:
      - mongodb_data:/data/db
    networks:
      - wip-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: wip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - wip-network

  # ChromaDB vector store
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: wip-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/chroma/chroma"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - wip-network

  # Website Intelligence Platform API
  wip-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/website_intelligence?authSource=admin
      REDIS_URL: redis://redis:6379

      # Vector Store
      VECTOR_STORE_TYPE: chromadb
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000

      # LLM Configuration (add your keys)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4-turbo-preview

      # Crawler Configuration
      MAX_CRAWL_DEPTH: 5
      CRAWL_TIMEOUT: 30000
      RATE_LIMIT_REQUESTS: 10

      # API Configuration
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      API_KEYS: ${API_KEYS:-demo_key_123}

      # Feature Flags
      ENABLE_SCHEDULER: "true"
      ENABLE_CHANGE_DETECTION: "true"
      ENABLE_LLM_SUMMARIZATION: "true"

      # Storage
      STORAGE_PATH: /data
      SCREENSHOTS_PATH: /data/screenshots
    volumes:
      - wip_data:/data
      - ./logs:/app/logs
    depends_on:
      - mongodb
      - redis
      - chromadb
    networks:
      - wip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Flower for Celery monitoring (optional)
  flower:
    image: mher/flower:2.0
    container_name: wip-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    depends_on:
      - redis
    networks:
      - wip-network
    profiles:
      - monitoring

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: wip-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - wip-network
    profiles:
      - monitoring

  # Grafana for dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: wip-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - wip-network
    profiles:
      - monitoring

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  chromadb_data:
    driver: local
  wip_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  wip-network:
    driver: bridge