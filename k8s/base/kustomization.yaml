apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: website-intelligence-platform

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
  - ingress.yaml
  - pvc.yaml

commonLabels:
  app: wip
  component: api
  managed-by: kustomize

configMapGenerator:
  - name: wip-config
    literals:
      - MAX_CRAWL_DEPTH=5
      - CRAWL_TIMEOUT=30000
      - RATE_LIMIT_REQUESTS=10
      - ENABLE_SCHEDULER=true
      - ENABLE_CHANGE_DETECTION=true
      - LOG_LEVEL=info

secretGenerator:
  - name: wip-secrets
    literals:
      - JWT_SECRET=change-me-in-production
      - API_KEYS=demo-key-123